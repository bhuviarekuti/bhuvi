<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classes Management</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#1f2a40;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:30px auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.card h2{
    margin-bottom:20px;
    color:#1f2a40;
}

input{
    width:23%;
    padding:10px;
    margin:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
    margin:5px;
}

.add{
    background:#28a745;
}

.update{
    background:#007bff;
}

.delete{
    background:#dc3545;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#1f2a40;
    color:white;
}
</style>

</head>
<body>

<header>
<h1>Classes Management</h1>
</header>

<div class="container">

<div class="card">

<h2>Manage Classes</h2>

<input type="text" id="subject" placeholder="Subject">
<input type="text" id="faculty" placeholder="Faculty Name">
<input type="text" id="time" placeholder="Time">
<input type="text" id="room" placeholder="Room No">

<br>

<button class="add" onclick="addClass()">Add</button>
<button class="update" onclick="updateClass()">Update</button>
<button class="delete" onclick="deleteClass()">Delete</button>

</div>

<table>

<thead>
<tr>
<th>Subject</th>
<th>Faculty</th>
<th>Time</th>
<th>Room</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

let classes = JSON.parse(localStorage.getItem("classes")) || [];

function save(){
    localStorage.setItem("classes",JSON.stringify(classes));
    display();
}

function addClass(){

    let subject=document.getElementById("subject").value.trim();
    let faculty=document.getElementById("faculty").value.trim();
    let time=document.getElementById("time").value.trim();
    let room=document.getElementById("room").value.trim();

    if(subject===""||faculty===""||time===""||room===""){
        alert("Fill all fields");
        return;
    }

    classes.push({subject,faculty,time,room});

    clearFields();
    save();
}

function updateClass(){

    let subject=document.getElementById("subject").value.trim();

    let cls=classes.find(c=>c.subject.toLowerCase()===subject.toLowerCase());

    if(!cls){
        alert("Class not found");
        return;
    }

    if(document.getElementById("faculty").value!="")
        cls.faculty=document.getElementById("faculty").value;

    if(document.getElementById("time").value!="")
        cls.time=document.getElementById("time").value;

    if(document.getElementById("room").value!="")
        cls.room=document.getElementById("room").value;

    clearFields();
    save();
}

function deleteClass(){

    let subject=document.getElementById("subject").value.trim();

    classes=classes.filter(c=>c.subject.toLowerCase()!=subject.toLowerCase());

    clearFields();
    save();
}

function display(){

    let table=document.getElementById("table");

    table.innerHTML="";

    if(classes.length===0){
        table.innerHTML="<tr><td colspan='4'>No Classes Available</td></tr>";
        return;
    }

    classes.forEach(c=>{

        table.innerHTML+=`
        <tr>
        <td>${c.subject}</td>
        <td>${c.faculty}</td>
        <td>${c.time}</td>
        <td>${c.room}</td>
        </tr>
        `;

    });

}

function clearFields(){

document.getElementById("subject").value="";
document.getElementById("faculty").value="";
document.getElementById("time").value="";
document.getElementById("room").value="";

}

display();

</script>

</body>
</html>
